<!DOCTYPE html>
<head>
  <!--Bootstrap CSS link-->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
    crossorigin="anonymous"
  />

  <!--Custom CSS Link from terms_popup.html-->
  <link rel="stylesheet" href="css/terms_popup_styles.css" />

  <link rel="icon" type="image/x-icon" href="images/CMI-Favicon.ico" />
</head>
<body>
  <!-- Button to trigger the modal via JavaScript -->
  <button type="button" class="btn btn-primary" onclick="showTermsModal()">
    Launch Terms Modal
  </button>

  <!-- Modal -->
  <div
    class="modal fade"
    id="terms-modal"
    tabindex="-1"
    aria-labelledby="termsModalLabel"
    aria-hidden="true"
  >
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-body" id="modal-body">
          <!-- Content will be loaded here -->
        </div>
      </div>
    </div>
  </div>

  <!--Bootstrap JS link-->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
    crossorigin="anonymous"
  ></script>

  <!--Terms popup (check if terms cookie exists if not prompt user to agree to terms)-->
  <script src="js/terms-popup.js"></script>
</body>
